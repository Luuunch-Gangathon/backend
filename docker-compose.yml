services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: spherecast
      POSTGRES_PASSWORD: spherecast
      POSTGRES_DB: spherecast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/database
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spherecast -d spherecast"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
